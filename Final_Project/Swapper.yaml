# Почему ваш swapper не работал я создал похожую на swapper
info:
  title: News API
  version: 1.0.0

servers:
  - url: https://virtserver.swaggerhub.com/mobydev-a27/News/1.0.0

paths:

  /news:
    get:
      summary: Get all news
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                - id: 1
                  title: "Пенсионные отчисления казахстанцев: Минтруда упразднит один из видов госуслуг"
                  createdAt: "2024-10-21"
                  author: "Администратор"
                  category:
                    id: 1
                    name: "Спорт"
                  image: "https://tengrinews.kz/userdata/news/2024/news_551682/thumb_b/photo_490428.jpeg.webp"
                  content: "Текст новости"

    post:
      summary: Create news
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: "Новость"
              createdAt: "2024-10-21"
              author: "Администратор"
              categoryId: 1
              image: "https://image.jpg"
              content: "Текст"
      responses:
        '201':
          description: Created


  /news/{id}:
    get:
      summary: Get news by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                id: 1
                title: "Пенсионные отчисления казахстанцев: Минтруда упразднит один из видов госуслуг"
                createdAt: "2024-10-21"
                author: "Администратор"
                category:
                  id: 1
                  name: "Спорт"
                image: "https://tengrinews.kz/userdata/news/2024/news_551682/thumb_b/photo_490428.jpeg.webp"
                content: |
                  "В новой редакции приказа, регулирующего вопросы оказания государственных услуг в социально-трудовой сфере, сказано, что один из видов государственных услуг будет исключен.

                  Речь идет о выдаче информации о поступлении и движении средств вкладчика Единого накопительного пенсионного фонда (ЕНПФ).

                  Почему госуслугу исключили из перечня, в документе не объяснили.

                  Как пояснили в пресс-службе Минтруда, инициатива по исключению услуги по выдаче информации о пенсионных отчислениях принадлежит Агентству по делам государственной службы.

                  Ранее государственная услуга была полностью автоматизирована и доступна на веб-портале и в мобильном приложении электронного правительства."

    delete:
      summary: Delete news
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
    
    put:
      summary: Update news
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: "Обновленная новость"
              createdAt: "2024-10-21"
              author: "Администратор"
              categoryId: 1
              image: "https://image.jpg"
              content: "Обновленный текст"
      responses:
        '200':
          description: Updated
          content:
            application/json:
              example:
                id: 1
                title: "Обновленная новость"
                createdAt: "2024-10-21"
                author: "Администратор"
                category:
                  id: 1
                  name: "Спорт"
                image: "https://image.jpg"
                content: "Обновленный текст"


  /categories:
    get:
      summary: Get categories
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                - id: 1
                  name: "Спорт"
                - id: 2
                  name: "Политика"


  /categories/{id}:
    get:
      summary: Get category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                id: 1
                name: "Спорт"


  /category:
    post:
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: "Спорт"
      responses:
        '201':
          description: Created


  /category/{id}:
    put:
      summary: Update category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            example:
              name: "Политика"
      responses:
        '200':
          description: Updated

    delete:
      summary: Delete category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted


  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: admin@mail.com
              password: 123456
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                token: "mock-jwt-token-123456"
        '401':
          description: Invalid credentials

  /auth/register:
      post:
        summary: Register user
        requestBody:
          required: true
          content:
            application/json:
              example:
                name: Администратор
                email: admin@mail.com
                password: 123456
      responses:
        '200':
          description: Registered
          content:
            application/json:
              example:
                id: 1
                name: Администратор
                email: admin@mail.com